<!--
Gemini Chatbot → A modern AI chatbot powered by the Google Gemini API.
Developed by Mohammad Fayas Khan using Flask, HTML, CSS, and JavaScript.
-->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="A smart chatbot powered by Google Gemini AI. Ask anything and get instant, context-aware answers." />
  <title>Gemini Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- Google Fonts – Inter for a modern, clean look -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>

  <!-- ===== Main Chat Container ===== -->
  <div class="chat-container">

    <!-- --- Header --- -->
    <header class="chat-header">
      <div class="header-left">
        <div class="logo-icon">
          <!-- Gemini-inspired sparkle SVG -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L14.09 8.26L20 9.27L15.55 13.97L16.91 20L12 16.9L7.09 20L8.45 13.97L4 9.27L9.91 8.26L12 2Z"
              fill="currentColor" />
          </svg>
        </div>
        <div>
          <h1>Gemini Chat</h1>
          <span class="subtitle">Powered by Google Gemini AI</span>
        </div>
      </div>
      <button id="btn-reset" class="btn-reset" title="New conversation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
      </button>
    </header>

    <!-- --- Message display area --- -->
    <main id="chat-messages" class="chat-messages">
      <!-- Welcome message shown on first load -->
      <div class="welcome-card">
        <div class="welcome-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L14.09 8.26L20 9.27L15.55 13.97L16.91 20L12 16.9L7.09 20L8.45 13.97L4 9.27L9.91 8.26L12 2Z"
              fill="url(#grad1)" />
            <defs>
              <linearGradient id="grad1" x1="4" y1="2" x2="20" y2="20">
                <stop offset="0%" stop-color="#6C63FF" />
                <stop offset="100%" stop-color="#48CFCB" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2>Hello! 👋</h2>
        <p>I'm your AI assistant powered by Gemini. Ask me anything → from coding help to creative writing.</p>
      </div>
    </main>

    <!-- --- Input area --- -->
    <footer class="chat-input-area">
      <form id="chat-form" autocomplete="off">
        <div class="input-wrapper">
          <textarea id="user-input" placeholder="Type your message…" rows="1"
            aria-label="Chat message input"></textarea>
          <button type="submit" id="btn-send" title="Send message" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </form>
      <p class="disclaimer">Gemini can make mistakes. Verify important information.</p>
    </footer>

  </div>

  <script src="/static/script.js"></script>
</body>

</html>
